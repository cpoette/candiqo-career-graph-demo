server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  # Vite assets: never fallback
  location ^~ /assets/ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # index.html: avoid caching
  location = /index.html {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
